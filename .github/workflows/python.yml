name: python

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Local verification
        run: uv run --with-editable . readwise-notebooklm-check

      - name: Install package and smoke console scripts
        run: |
          python -m pip install .
          readwise-api-triage --help >/tmp/triage-console-help.txt
          readwise-nlm-deepdive --help >/tmp/deepdive-console-help.txt
