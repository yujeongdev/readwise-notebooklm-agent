name: python

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Compile package
        run: uv run python -m compileall src tests
      - name: CLI help smoke tests
        run: |
          PYTHONPATH=src uv run python -m readwise_notebooklm_agent.triage --help >/tmp/triage-help.txt
          PYTHONPATH=src uv run python -m readwise_notebooklm_agent.deepdive --help >/tmp/deepdive-help.txt
      - name: Unit tests
        run: PYTHONPATH=src uv run python -m unittest discover -s tests -v

      - name: Install package and smoke console scripts
        run: |
          python -m pip install .
          readwise-api-triage --help >/tmp/triage-console-help.txt
          readwise-nlm-deepdive --help >/tmp/deepdive-console-help.txt
